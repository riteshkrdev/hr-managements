<div class="employee-page">

  <!-- Page Header -->
  <div class="page-header">
    <div>
      <!-- <h2 class="page-title">Employees</h2> -->
      <p class="page-subtitle">
        Manage employee records, departments and status.
      </p>
    </div>

    <div>
      <button class="bg-blue-900" mat-raised-button color="primary" (click)="addNewEmployee()">
        <mat-icon>add</mat-icon>
        Add Employee
      </button>
    </div>
  </div>

  <hr class="section-divider"/>

  <!-- Table -->
  <table mat-table [dataSource]="employees" class="mat-elevation-z2 employee-table">

    <!-- ID -->
    <ng-container matColumnDef="id" >
      <th mat-header-cell *matHeaderCellDef style="max-width:100px">ID</th>
      <td mat-cell *matCellDef="let employee" style="max-width:100px">{{ employee.id }}</td>
    </ng-container>

    <!-- Name -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Full Name</th>
      <td mat-cell *matCellDef="let employee">
        {{ employee.firstName }} {{ employee.lastName }}
      </td>
    </ng-container>

    <!-- Email -->
    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let employee">{{ employee.email }}</td>
    </ng-container>

    <!-- Department -->
    <ng-container matColumnDef="department">
      <th mat-header-cell *matHeaderCellDef>Department</th>
      <td mat-cell *matCellDef="let employee">{{ employee.department }}</td>
    </ng-container>

    <!-- Salary -->
    <ng-container matColumnDef="salary">
      <th mat-header-cell *matHeaderCellDef>Salary</th>
      <td mat-cell *matCellDef="let employee">
        {{ employee.salary | currency }}
      </td>
    </ng-container>

    <!-- Status -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let employee">
        <mat-chip [color]="employee.active ? 'primary' : 'warn'" selected>
          {{ employee.active ? 'Active' : 'Inactive' }}
        </mat-chip>
      </td>
    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef style="width:180px">Actions</th>
      <td mat-cell *matCellDef="let employee">

        <button mat-icon-button color="primary"
          (click)="editEmployee(employee)">
          <mat-icon>edit</mat-icon>
        </button>

        <button mat-icon-button color="warn"
          (click)="delete(employee.id)">
          <mat-icon>delete</mat-icon>
        </button>

      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="['id','name','email','department','salary','status','actions']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['id','name','email','department','salary','status','actions'];"></tr>

  </table>
  <mat-paginator 
  [pageSize]="10"
  [pageSizeOptions]="[5,10,20]"
  showFirstLastButtons>
</mat-paginator>

</div>
