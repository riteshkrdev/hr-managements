<div class="project-page">

    <!-- Page Header -->
    <div class="page-header">
        <div>
            <p class="page-subtitle">Track projects, budgets, assigned departments and deadlines.</p>
        </div>
        <div>
            <button class="bg-blue-900" mat-raised-button color="primary" (click)="addNewProject()">
                <mat-icon>add</mat-icon>
                Add Project
            </button>
        </div>
    </div>

    <hr class="section-divider" />

    <!-- Loading -->
    <div *ngIf="loading" class="loading-state">Loading projects...</div>

    <!-- Table -->
    <table mat-table [dataSource]="projects" class="mat-elevation-z2 project-table">

        <!-- ID -->
        <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef style="max-width:100px">ID</th>
            <td mat-cell *matCellDef="let proj" class="id-cell">{{ proj.id }}</td>
        </ng-container>

        <!-- Name -->
        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Project Name</th>
            <td mat-cell *matCellDef="let proj">{{ proj.name }}</td>
        </ng-container>

        <!-- Department -->
        <ng-container matColumnDef="department">
            <th mat-header-cell *matHeaderCellDef>Department</th>
            <td mat-cell *matCellDef="let proj">{{ proj.department }}</td>
        </ng-container>

        <!-- Status -->
        <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef>Status</th>
            <td mat-cell *matCellDef="let proj">
                <mat-chip [color]="statusColor(proj.status)" selected>
                    {{ proj.status | titlecase }}
                </mat-chip>
            </td>
        </ng-container>

        <!-- Budget -->
        <ng-container matColumnDef="budget">
            <th mat-header-cell *matHeaderCellDef>Budget</th>
            <td mat-cell *matCellDef="let proj">{{ proj.budget | currency }}</td>
        </ng-container>

        <!-- Deadline -->
        <ng-container matColumnDef="deadline">
            <th mat-header-cell *matHeaderCellDef>Deadline</th>
            <td mat-cell *matCellDef="let proj">{{ proj.deadline }}</td>
        </ng-container>

        <!-- Actions -->
        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef style="width:180px">Actions</th>
            <td mat-cell *matCellDef="let proj">
                <button mat-icon-button color="primary" (click)="editProject(proj)">
                    <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button color="warn" (click)="delete(proj.id)">
                    <mat-icon>delete</mat-icon>
                </button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [pageSize]="10" [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons>
    </mat-paginator>

</div>
